<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#eef2f6">
<title>Přetok u Šmogyho</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#eef2f6;
    --card:#ffffff;
    --orange:#f5933d;
    --orange-dark:#e8801f;
    --navy:#2c3e50;
    --grey-text:#5b6b78;
    --green:#3fb950;
    --red:#e5534b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--navy);
    height:100%;
    overscroll-behavior:none;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding:
      max(16px, env(safe-area-inset-top))
      max(16px, env(safe-area-inset-right))
      max(16px, env(safe-area-inset-bottom))
      max(16px, env(safe-area-inset-left));
  }
  .page{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .topbar{
    text-align:center;
    margin-bottom:14px;
  }
  .title{
    font-size:21px;
    font-weight:700;
    color:var(--navy);
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:13px;
    color:var(--grey-text);
    margin-top:4px;
  }
  .card{
    width:100%;
    aspect-ratio:1/1;
    background:var(--card);
    border-radius:28px;
    padding:24px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 1px 3px rgba(44,62,80,0.06);
  }
  .nodes{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
  }
  .node{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .icon{
    width:42px;
    height:42px;
    margin-bottom:12px;
  }
  .node-label{
    font-size:17px;
    font-weight:700;
    color:var(--navy);
  }
  .node-value{
    font-size:17px;
    color:var(--navy);
    margin-top:4px;
    font-weight:400;
  }
  .arrow{
    width:30px;
    height:22px;
    color:var(--orange);
  }
  .flow-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .divider{
    width:100%;
    height:1px;
    background:rgba(44,62,80,0.08);
    margin:22px 0 18px;
  }
  .shelly-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .traffic-light{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#cfd6dc;
    flex-shrink:0;
    transition:background .2s ease;
  }
  .traffic-light.on{
    background:var(--green);
  }
  .traffic-light.off{
    background:var(--red);
  }
  .shelly-label{
    font-size:14px;
    color:var(--grey-text);
  }
  .shelly-label .state{
    font-weight:700;
    color:var(--navy);
  }
  .meta{
    text-align:center;
    margin-top:14px;
  }
  .updated{
    font-size:12px;
    color:var(--grey-text);
  }
  .refresh-btn{
    width:100%;
    margin-top:16px;
    padding:15px;
    border:none;
    border-radius:16px;
    background:var(--orange);
    color:#fff;
    font-size:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .15s ease, background .15s ease;
  }
  .refresh-btn:active{
    transform:scale(0.97);
    background:var(--orange-dark);
  }
  .refresh-btn.loading svg{
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  .error-banner{
    width:100%;
    margin-bottom:12px;
    padding:12px 14px;
    background:#fdecea;
    color:#b3372c;
    border-radius:14px;
    font-size:13px;
    text-align:center;
    display:none;
  }
  .error-banner.show{
    display:block;
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="title">přetok u Šmogyho</div>
    <div class="subtitle">živá data ze Solax</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="card">
    <div class="nodes">
      <div class="node">
        <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="14" width="48" height="30" rx="2"/>
          <line x1="8" y1="24" x2="56" y2="24"/>
          <line x1="8" y1="34" x2="56" y2="34"/>
          <line x1="22" y1="14" x2="22" y2="44"/>
          <line x1="36" y1="14" x2="36" y2="44"/>
          <line x1="50" y1="14" x2="50" y2="44"/>
          <line x1="32" y1="44" x2="32" y2="52"/>
          <line x1="20" y1="52" x2="44" y2="52"/>
        </svg>
        <div class="node-label">FVE</div>
        <div class="node-value" id="fveValue">– kW</div>
      </div>

      <div class="flow-col">
        <svg class="arrow" viewBox="0 0 34 24" fill="none">
          <path d="M17 2 L17 18 M9 12 L17 20 L25 12" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="node">
          <div class="node-label">Přetok</div>
          <div class="node-value" id="feedinValue">– kW</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="shelly-row">
      <div class="traffic-light" id="shellyLight"></div>
      <div class="shelly-label">Relé: <span class="state" id="shellyState">–</span></div>
    </div>
  </div>

  <div class="meta">
    <div class="updated" id="updatedAt">Načítám…</div>
  </div>

  <button class="refresh-btn" id="refreshBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
      <path d="M21 3v6h-6"/>
    </svg>
    <span id="refreshLabel">Aktualizovat</span>
  </button>
</div>

<script>
const fveEl = document.getElementById('fveValue');
const feedinEl = document.getElementById('feedinValue');
const updatedEl = document.getElementById('updatedAt');
const errorEl = document.getElementById('errorBanner');
const btn = document.getElementById('refreshBtn');
const btnLabel = document.getElementById('refreshLabel');
const shellyLight = document.getElementById('shellyLight');
const shellyState = document.getElementById('shellyState');

function formatKw(value) {
  return value.toFixed(1).replace('.', ',') + ' kW';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

async function loadSolax() {
  const res = await fetch('/api/solax');
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Neznámá chyba (Solax)');
  fveEl.textContent = formatKw(data.fveKw);
  feedinEl.textContent = formatKw(data.feedinKw);
  updatedEl.textContent = 'Data ze střídače: ' + formatTime(data.uploadTime);
}

async function loadShelly() {
  try {
    const res = await fetch('/api/shelly');
    const data = await res.json();
    if (!res.ok || data.isOn === null || data.isOn === undefined) {
      shellyLight.className = 'traffic-light';
      shellyState.textContent = 'neznámý';
      return;
    }
    if (data.isOn) {
      shellyLight.className = 'traffic-light on';
      shellyState.textContent = 'zapnuto';
    } else {
      shellyLight.className = 'traffic-light off';
      shellyState.textContent = 'vypnuto';
    }
  } catch (err) {
    shellyLight.className = 'traffic-light';
    shellyState.textContent = 'neznámý';
  }
}

async function loadData(isManual) {
  if (isManual) {
    btn.classList.add('loading');
    btnLabel.textContent = 'Aktualizuji…';
  }
  try {
    await loadSolax();
    errorEl.classList.remove('show');
  } catch (err) {
    errorEl.textContent = 'Nepodařilo se načíst data: ' + err.message;
    errorEl.classList.add('show');
  }
  await loadShelly();
  btn.classList.remove('loading');
  btnLabel.textContent = 'Aktualizovat';
}

btn.addEventListener('click', () => loadData(true));

loadData(false);
setInterval(() => loadData(false), 5 * 60 * 1000);
</script>
</body>
</html>
