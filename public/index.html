<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#eef2f6">
<title>Přetok u Šmogyho</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#eef2f6;
    --card:#ffffff;
    --orange:#f5933d;
    --orange-dark:#e8801f;
    --navy:#2c3e50;
    --grey-text:#5b6b78;
    --green:#3fb950;
    --red:#e5534b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--navy);
    height:100%;
    overscroll-behavior:none;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding:
      max(16px, env(safe-area-inset-top))
      max(16px, env(safe-area-inset-right))
      max(16px, env(safe-area-inset-bottom))
      max(16px, env(safe-area-inset-left));
  }
  .page{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .topbar{
    text-align:center;
    margin-bottom:14px;
  }
  .title{
    font-size:21px;
    font-weight:700;
    color:var(--navy);
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:13px;
    color:var(--grey-text);
    margin-top:4px;
  }
  .card{
    width:100%;
    background:var(--card);
    border-radius:28px;
    padding:28px 20px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 1px 3px rgba(44,62,80,0.06);
  }
  .nodes{
    width:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
  }
  .node{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .icon-slot{
    height:46px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:12px;
  }
  .icon{
    width:42px;
    height:42px;
  }
  .icon-fve{
    width:50px;
    height:50px;
  }
  .node-label{
    font-size:17px;
    font-weight:700;
    color:var(--navy);
  }
  .node-value{
    font-size:17px;
    color:var(--navy);
    margin-top:4px;
    font-weight:400;
  }
  .arrow{
    width:30px;
    height:22px;
    color:var(--orange);
  }
  .flow-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .divider{
    width:100%;
    height:1px;
    background:rgba(44,62,80,0.08);
    margin:22px 0 18px;
  }
  .shelly-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .traffic-light{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#cfd6dc;
    flex-shrink:0;
    transition:background .2s ease;
  }
  .traffic-light.on{
    background:var(--green);
  }
  .traffic-light.off{
    background:var(--red);
  }
  .shelly-label{
    font-size:14px;
    color:var(--grey-text);
  }
  .shelly-label .state{
    font-weight:700;
    color:var(--navy);
  }
  .power-buttons{
    display:flex;
    gap:18px;
    margin-top:16px;
  }
  .device-block{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:18px;
    margin-bottom:18px;
    border-bottom:1px solid rgba(44,62,80,0.08);
  }
  .device-block.last{
    padding-bottom:0;
    margin-bottom:0;
    border-bottom:none;
  }
  .power-btn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
    color:#fff;
    transition:transform .15s ease, opacity .15s ease;
  }
  .power-btn:active{
    transform:scale(0.93);
  }
  .power-btn.on-btn{
    background:var(--green);
  }
  .power-btn.off-btn{
    background:var(--red);
  }
  .power-btn:disabled{
    opacity:0.5;
  }
  .power-btn.active-state{
    box-shadow:0 0 0 3px rgba(44,62,80,0.18);
  }
  .meta{
    text-align:center;
    margin-top:14px;
  }
  .updated{
    font-size:12px;
    color:var(--grey-text);
  }
  .refresh-btn{
    width:100%;
    margin-top:16px;
    padding:15px;
    border:none;
    border-radius:16px;
    background:var(--orange);
    color:#fff;
    font-size:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .15s ease, background .15s ease;
  }
  .refresh-btn:active{
    transform:scale(0.97);
    background:var(--orange-dark);
  }
  .refresh-btn.loading svg{
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  .error-banner{
    width:100%;
    margin-bottom:12px;
    padding:12px 14px;
    background:#fdecea;
    color:#b3372c;
    border-radius:14px;
    font-size:13px;
    text-align:center;
    display:none;
  }
  .error-banner.show{
    display:block;
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="title">přetok u Šmogyho</div>
    <div class="subtitle">živá data ze Solax</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="card">
    <div class="nodes">
      <div class="node">
        <div class="icon-slot">
          <svg class="icon icon-fve" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <!-- sun -->
            <circle cx="47" cy="13" r="8.5"/>
            <line x1="47" y1="0" x2="47" y2="3"/>
            <line x1="34.5" y1="5.5" x2="36.5" y2="7.7"/>
            <line x1="59.5" y1="5.5" x2="57.5" y2="7.7"/>
            <line x1="30" y1="13" x2="33" y2="13"/>
            <line x1="64" y1="13" x2="61" y2="13"/>
            <line x1="34.5" y1="20.5" x2="36.5" y2="18.3"/>
            <line x1="59.5" y1="20.5" x2="57.5" y2="18.3"/>
            <line x1="47" y1="26" x2="47" y2="23"/>
            <!-- panel (perspective trapezoid) -->
            <path d="M9 21 L46 17 L57 47 L2 50 Z"/>
            <line x1="9" y1="21" x2="2" y2="50"/>
            <line x1="46" y1="17" x2="57" y2="47"/>
            <line x1="13.7" y1="20.5" x2="9.6" y2="49.6"/>
            <line x1="18.6" y1="20" x2="17.5" y2="49.2"/>
            <line x1="23.5" y1="19.5" x2="25.5" y2="48.8"/>
            <line x1="28.4" y1="19" x2="33.5" y2="48.4"/>
            <line x1="33.3" y1="18.5" x2="41.5" y2="48"/>
            <line x1="38.2" y1="18" x2="49.5" y2="47.6"/>
            <line x1="4.2" y1="35.5" x2="55.3" y2="32.5"/>
            <!-- stand -->
            <line x1="29.5" y1="50" x2="29.5" y2="58"/>
            <path d="M16 64 L29.5 58 L43 64"/>
          </svg>
        </div>
        <div class="node-label">FVE</div>
        <div class="node-value" id="fveValue">– kW</div>
      </div>

      <div class="flow-col">
        <div class="icon-slot">
          <svg class="arrow" viewBox="0 0 34 24" fill="none">
            <path d="M17 2 L17 18 M9 12 L17 20 L25 12" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="node-label">Přetok</div>
        <div class="node-value" id="feedinValue">– kW</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="device-block">
      <div class="shelly-row">
        <div class="traffic-light" id="shellyLight"></div>
        <div class="shelly-label">Bojler: <span class="state" id="shellyState">–</span></div>
      </div>
      <div class="power-buttons">
        <button class="power-btn on-btn" id="onBtn">ON</button>
        <button class="power-btn off-btn" id="offBtn">OFF</button>
      </div>
    </div>

    <div class="device-block">
      <div class="shelly-row">
        <div class="traffic-light" id="poolLight"></div>
        <div class="shelly-label">Bazén: <span class="state" id="poolState">–</span></div>
      </div>
    </div>

    <div class="device-block last">
      <div class="shelly-row">
        <div class="traffic-light" id="solinatorLight"></div>
        <div class="shelly-label">Solinator: <span class="state" id="solinatorState">–</span></div>
      </div>
    </div>
  </div>

  <div class="meta">
    <div class="updated" id="updatedAt">Načítám…</div>
  </div>

  <button class="refresh-btn" id="refreshBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
      <path d="M21 3v6h-6"/>
    </svg>
    <span id="refreshLabel">Aktualizovat</span>
  </button>
</div>

<script>
const fveEl = document.getElementById('fveValue');
const feedinEl = document.getElementById('feedinValue');
const updatedEl = document.getElementById('updatedAt');
const errorEl = document.getElementById('errorBanner');
const btn = document.getElementById('refreshBtn');
const btnLabel = document.getElementById('refreshLabel');
const shellyLight = document.getElementById('shellyLight');
const shellyState = document.getElementById('shellyState');
const onBtn = document.getElementById('onBtn');
const offBtn = document.getElementById('offBtn');
const poolLight = document.getElementById('poolLight');
const poolState = document.getElementById('poolState');
const solinatorLight = document.getElementById('solinatorLight');
const solinatorState = document.getElementById('solinatorState');

function formatKw(value) {
  return value.toFixed(1).replace('.', ',') + ' kW';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

async function loadSolax() {
  const res = await fetch('/api/solax');
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Neznámá chyba (Solax)');
  fveEl.textContent = formatKw(data.fveKw);
  feedinEl.textContent = formatKw(data.feedinKw);
  updatedEl.textContent = 'Data ze střídače: ' + formatTime(data.uploadTime);
}

async function loadTrafficLight(endpoint, lightEl, stateEl) {
  try {
    const res = await fetch(endpoint);
    const data = await res.json();
    if (!res.ok || data.isOn === null || data.isOn === undefined) {
      lightEl.className = 'traffic-light';
      stateEl.textContent = 'neznámý';
      return null;
    }
    if (data.isOn) {
      lightEl.className = 'traffic-light on';
      stateEl.textContent = 'zapnuto';
    } else {
      lightEl.className = 'traffic-light off';
      stateEl.textContent = 'vypnuto';
    }
    return data.isOn;
  } catch (err) {
    lightEl.className = 'traffic-light';
    stateEl.textContent = 'neznámý';
    return null;
  }
}

async function loadShelly() {
  const isOn = await loadTrafficLight('/api/shelly', shellyLight, shellyState);
  if (isOn === true) {
    onBtn.classList.add('active-state');
    offBtn.classList.remove('active-state');
  } else if (isOn === false) {
    offBtn.classList.add('active-state');
    onBtn.classList.remove('active-state');
  } else {
    onBtn.classList.remove('active-state');
    offBtn.classList.remove('active-state');
  }
}

async function loadPool() {
  await loadTrafficLight('/api/pool', poolLight, poolState);
}

async function loadSolinator() {
  await loadTrafficLight('/api/solinator', solinatorLight, solinatorState);
}

async function setShelly(turn) {
  onBtn.disabled = true;
  offBtn.disabled = true;
  try {
    const res = await fetch('/api/shelly/set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ turn })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Příkaz se nepodařilo odeslat.');
    errorEl.classList.remove('show');
  } catch (err) {
    errorEl.textContent = 'Bojler se nepodařilo přepnout: ' + err.message;
    errorEl.classList.add('show');
  }
  await loadShelly();
  onBtn.disabled = false;
  offBtn.disabled = false;
}

onBtn.addEventListener('click', () => setShelly('on'));
offBtn.addEventListener('click', () => setShelly('off'));

async function loadData(isManual) {
  if (isManual) {
    btn.classList.add('loading');
    btnLabel.textContent = 'Aktualizuji…';
  }
  try {
    await loadSolax();
    errorEl.classList.remove('show');
  } catch (err) {
    errorEl.textContent = 'Nepodařilo se načíst data: ' + err.message;
    errorEl.classList.add('show');
  }
  await loadShelly();
  await loadPool();
  await loadSolinator();
  btn.classList.remove('loading');
  btnLabel.textContent = 'Aktualizovat';
}

btn.addEventListener('click', () => loadData(true));

loadData(false);
setInterval(() => loadData(false), 5 * 60 * 1000);
</script>
</body>
</html>
