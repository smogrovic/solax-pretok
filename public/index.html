<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#eef2f6">
<title>Přetok u Šmogyho</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#eef2f6;
    --card:#ffffff;
    --orange:#f5933d;
    --orange-dark:#e8801f;
    --navy:#2c3e50;
    --grey-text:#5b6b78;
    --green:#3fb950;
    --red:#e5534b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--navy);
    overscroll-behavior:none;
  }
  body{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .slider-wrap{
    flex:1;
    display:flex;
    overflow-x:scroll;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .slider-wrap::-webkit-scrollbar{display:none;}
  .slide{
    flex:none;
    width:100vw;
    height:100%;
    scroll-snap-align:start;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:
      max(20px, env(safe-area-inset-top))
      max(16px, env(safe-area-inset-right))
      max(16px, env(safe-area-inset-bottom))
      max(16px, env(safe-area-inset-left));
  }
  .page{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:auto;
  }
  .topbar{
    text-align:center;
    margin-bottom:14px;
  }
  .title{
    font-size:21px;
    font-weight:700;
    color:var(--navy);
    letter-spacing:-0.01em;
  }
  .card{
    width:100%;
    background:var(--card);
    border-radius:28px;
    padding:24px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 1px 3px rgba(44,62,80,0.06);
  }
  .nodes{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
  }
  .node.full{
    grid-column:1 / -1;
  }
  .node{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:rgba(44,62,80,0.04);
    border-radius:18px;
    padding:12px 8px;
  }
  .icon-slot{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:8px;
  }
  .icon{
    width:40px;
    height:40px;
  }
  .icon-fve{
    width:46px;
    height:46px;
  }
  .node-label{
    font-size:13px;
    font-weight:700;
    color:var(--navy);
    white-space:nowrap;
  }
  .node-value{
    font-size:13px;
    color:var(--grey-text);
    margin-top:2px;
    font-weight:600;
    white-space:nowrap;
  }
  .device-block{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:18px;
    margin-bottom:18px;
    border-bottom:1px solid rgba(44,62,80,0.08);
  }
  .device-block.last{
    padding-bottom:0;
    margin-bottom:0;
    border-bottom:none;
  }
  .shelly-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .traffic-light{
    width:14px;
    height:14px;
    border-radius:50%;
    background:#cfd6dc;
    flex-shrink:0;
    transition:background .2s ease;
  }
  .traffic-light.on{background:var(--green);}
  .traffic-light.off{background:var(--red);}
  .shelly-label{
    font-size:14px;
    color:var(--grey-text);
  }
  .shelly-label .state{
    font-weight:700;
    color:var(--navy);
  }
  .power-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:700;
    color:#fff;
    transition:transform .15s ease, opacity .15s ease;
  }
  .power-btn:active{transform:scale(0.93);}
  .power-btn.on-btn{background:var(--green);}
  .power-btn.off-btn{background:var(--red);}
  .power-btn:disabled{opacity:0.5;}
  .power-btn.active-state{box-shadow:0 0 0 3px rgba(44,62,80,0.18);}
  .device-power{
    font-size:12px;
    color:var(--grey-text);
    margin-top:6px;
    min-height:16px;
  }
  .power-buttons{
    display:flex;
    gap:14px;
    margin-top:12px;
  }
  .meta{
    text-align:center;
    margin-top:14px;
  }
  .updated{
    font-size:12px;
    color:var(--grey-text);
  }
  .refresh-btn{
    width:100%;
    margin-top:16px;
    padding:15px;
    border:none;
    border-radius:16px;
    background:var(--orange);
    color:#fff;
    font-size:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .15s ease, background .15s ease;
  }
  .refresh-btn:active{
    transform:scale(0.97);
    background:var(--orange-dark);
  }
  .refresh-btn.loading svg{
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  .pool-card{
    margin-top:12px;
  }
  .graph-card{
    margin-top:12px;
    padding:16px 14px 10px;
    align-items:stretch;
  }
  .graph-title{
    font-size:13px;
    font-weight:700;
    color:var(--navy);
    text-align:center;
    margin-bottom:8px;
  }
  #feedinChart{
    width:100%;
    height:120px;
    display:block;
  }
  .graph-total{
    font-size:12px;
    font-weight:600;
    color:var(--grey-text);
    text-align:center;
    margin-top:6px;
    min-height:15px;
  }
  .notif-btn{
    width:100%;
    margin-top:10px;
    padding:11px;
    border:none;
    border-radius:16px;
    background:rgba(44,62,80,0.06);
    color:var(--grey-text);
    font-size:13px;
    font-weight:600;
    transition:opacity .15s ease;
  }
  .notif-btn:disabled{opacity:0.7;}
  .error-banner{
    width:100%;
    margin-bottom:12px;
    padding:12px 14px;
    background:#fdecea;
    color:#b3372c;
    border-radius:14px;
    font-size:13px;
    text-align:center;
    display:none;
  }
  .error-banner.show{display:block;}
  .page-dots{
    flex-shrink:0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:10px 0 max(14px, env(safe-area-inset-bottom));
    background:var(--bg);
  }
  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(44,62,80,0.2);
    cursor:pointer;
    transition:background .2s, transform .2s;
  }
  .dot.active{
    background:var(--orange);
    transform:scale(1.2);
  }
</style>
</head>
<body>

<div class="slider-wrap" id="sliderWrap">

  <!-- Slide 1: Stats -->
  <div class="slide">
    <div class="page">
      <div class="topbar">
        <div class="title">Šmogyho FVE</div>
      </div>
      <div class="error-banner" id="errorBanner"></div>
      <div class="card">
        <div class="nodes">
          <div class="node">
            <div class="icon-slot">
              <svg class="icon icon-fve" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <!-- sun -->
                <circle cx="47" cy="13" r="8.5"/>
                <line x1="47" y1="0" x2="47" y2="3"/>
                <line x1="34.5" y1="5.5" x2="36.5" y2="7.7"/>
                <line x1="59.5" y1="5.5" x2="57.5" y2="7.7"/>
                <line x1="30" y1="13" x2="33" y2="13"/>
                <line x1="64" y1="13" x2="61" y2="13"/>
                <line x1="34.5" y1="20.5" x2="36.5" y2="18.3"/>
                <line x1="59.5" y1="20.5" x2="57.5" y2="18.3"/>
                <line x1="47" y1="26" x2="47" y2="23"/>
                <!-- panel (perspective trapezoid) -->
                <path d="M9 21 L46 17 L57 47 L2 50 Z"/>
                <line x1="9" y1="21" x2="2" y2="50"/>
                <line x1="46" y1="17" x2="57" y2="47"/>
                <line x1="13.7" y1="20.5" x2="9.6" y2="49.6"/>
                <line x1="18.6" y1="20" x2="17.5" y2="49.2"/>
                <line x1="23.5" y1="19.5" x2="25.5" y2="48.8"/>
                <line x1="28.4" y1="19" x2="33.5" y2="48.4"/>
                <line x1="33.3" y1="18.5" x2="41.5" y2="48"/>
                <line x1="38.2" y1="18" x2="49.5" y2="47.6"/>
                <line x1="4.2" y1="35.5" x2="55.3" y2="32.5"/>
                <!-- stand -->
                <line x1="29.5" y1="50" x2="29.5" y2="58"/>
                <path d="M16 64 L29.5 58 L43 64"/>
              </svg>
            </div>
            <div class="node-label">FVE</div>
            <div class="node-value" id="fveValue">– kW</div>
          </div>

          <div class="node">
            <div class="icon-slot">
              <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="10" y="18" width="38" height="32" rx="3"/>
                <line x1="52" y1="27" x2="52" y2="41"/>
                <line x1="32" y1="10" x2="32" y2="18"/>
                <polyline points="26,15 32,8 38,15" fill="none"/>
                <line x1="32" y1="54" x2="32" y2="62"/>
                <polyline points="38,57 32,64 26,57" fill="none"/>
              </svg>
            </div>
            <div class="node-label" id="batPowerLabel">Tok baterie</div>
            <div class="node-value" id="batPowerValue">– kW</div>
          </div>

          <div class="node">
            <div class="icon-slot">
              <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 32 L32 9 L58 32"/>
                <path d="M13 26 V56 H51 V26"/>
                <line x1="25" y1="56" x2="25" y2="40"/>
                <line x1="39" y1="56" x2="39" y2="40"/>
                <line x1="25" y1="40" x2="39" y2="40"/>
                <line x1="44" y1="20" x2="44" y2="12"/>
                <line x1="40" y1="12" x2="48" y2="12"/>
              </svg>
            </div>
            <div class="node-label">Spotřeba domu</div>
            <div class="node-value" id="houseValue">– kW</div>
          </div>

          <div class="node">
            <div class="icon-slot">
              <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="10" y="18" width="38" height="32" rx="3"/>
                <line x1="52" y1="27" x2="52" y2="41"/>
                <path d="M26 24 L18 35 L26 35 L22 44 L34 31 L26 31 Z" fill="var(--orange)" stroke="none"/>
              </svg>
            </div>
            <div class="node-label">Baterie</div>
            <div class="node-value" id="batteryValue">– %</div>
          </div>

          <div class="node full">
            <div class="icon-slot">
              <svg width="36" height="36" viewBox="0 0 34 24" fill="none">
                <path d="M17 2 L17 18 M9 12 L17 20 L25 12" stroke="var(--orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="node-label">Přetok</div>
            <div class="node-value" id="feedinValue">– kW</div>
          </div>
        </div>
      </div>

      <div class="card graph-card">
        <div class="graph-title">Přetok za 24 h (kW)</div>
        <canvas id="feedinChart"></canvas>
        <div class="graph-total" id="feedinTotal"></div>
      </div>

      <div class="meta">
        <div class="updated" id="updatedAt">Načítám…</div>
      </div>

      <button class="refresh-btn" id="refreshBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
          <path d="M21 3v6h-6"/>
        </svg>
        <span id="refreshLabel">Aktualizovat</span>
      </button>

      <button class="notif-btn" id="notifBtn">🔔 Zapnout notifikace</button>
    </div>
  </div>

  <!-- Slide 2: Devices -->
  <div class="slide">
    <div class="page">
      <div class="topbar">
        <div class="title">Ovládání</div>
      </div>
      <div class="card">
        <div class="device-block last">
          <div class="shelly-row">
            <div class="traffic-light" id="shellyLight"></div>
            <div class="shelly-label">Bojler: <span class="state" id="shellyState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="onBtn">ON</button>
            <button class="power-btn off-btn" id="offBtn">OFF</button>
          </div>
          <div class="device-power" id="shellyPower"></div>
        </div>
      </div>

      <div class="card pool-card">
        <div class="device-block">
          <div class="shelly-row">
            <div class="traffic-light" id="poolLight"></div>
            <div class="shelly-label">Bazén: <span class="state" id="poolState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="poolOnBtn">ON</button>
            <button class="power-btn off-btn" id="poolOffBtn">OFF</button>
          </div>
        </div>

        <div class="device-block last">
          <div class="shelly-row">
            <div class="traffic-light" id="solinatorLight"></div>
            <div class="shelly-label">Solinátor: <span class="state" id="solinatorState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="solinatorOnBtn">ON</button>
            <button class="power-btn off-btn" id="solinatorOffBtn">OFF</button>
          </div>
          <div class="device-power" id="poolTotalPower"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Slide 3: Světla -->
  <div class="slide">
    <div class="page">
      <div class="topbar">
        <div class="title">Světla</div>
      </div>
      <div class="card">
        <div class="device-block">
          <div class="shelly-row">
            <div class="traffic-light" id="lightDoleLight"></div>
            <div class="shelly-label">Zahrada dole: <span class="state" id="lightDoleState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="lightDoleOnBtn">ON</button>
            <button class="power-btn off-btn" id="lightDoleOffBtn">OFF</button>
          </div>
        </div>

        <div class="device-block">
          <div class="shelly-row">
            <div class="traffic-light" id="lightNahoreLight"></div>
            <div class="shelly-label">Zahrada nahoře: <span class="state" id="lightNahoreState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="lightNahoreOnBtn">ON</button>
            <button class="power-btn off-btn" id="lightNahoreOffBtn">OFF</button>
          </div>
        </div>

        <div class="device-block">
          <div class="shelly-row">
            <div class="traffic-light" id="lightBazenLight"></div>
            <div class="shelly-label">Světlo bazén: <span class="state" id="lightBazenState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="lightBazenOnBtn">ON</button>
            <button class="power-btn off-btn" id="lightBazenOffBtn">OFF</button>
          </div>
        </div>

        <div class="device-block last">
          <div class="shelly-row">
            <div class="traffic-light" id="lightNocniLight"></div>
            <div class="shelly-label">Noční světla: <span class="state" id="lightNocniState">–</span></div>
          </div>
          <div class="power-buttons">
            <button class="power-btn on-btn" id="lightNocniOnBtn">ON</button>
            <button class="power-btn off-btn" id="lightNocniOffBtn">OFF</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="page-dots" id="pageDots">
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

<script>
const fveEl = document.getElementById('fveValue');
const feedinEl = document.getElementById('feedinValue');
const houseEl = document.getElementById('houseValue');
const batteryEl = document.getElementById('batteryValue');
const batPowerEl = document.getElementById('batPowerValue');
const batPowerLabel = document.getElementById('batPowerLabel');
const poolTotalPowerEl = document.getElementById('poolTotalPower');
const updatedEl = document.getElementById('updatedAt');
const errorEl = document.getElementById('errorBanner');
const btn = document.getElementById('refreshBtn');
const btnLabel = document.getElementById('refreshLabel');

function formatKw(value) {
  if (typeof value !== 'number' || Number.isNaN(value)) return '– kW';
  return value.toFixed(1).replace('.', ',') + ' kW';
}

function formatBatPower(kw) {
  if (typeof kw !== 'number' || Number.isNaN(kw)) return '– kW';
  if (Math.abs(kw) < 0.05) return 'nečinná';
  return (kw > 0 ? '+' : '') + kw.toFixed(1).replace('.', ',') + ' kW';
}

function formatPct(value) {
  if (value === null || value === undefined) return '– %';
  return Math.round(value) + ' %';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

function renderSolax(data) {
  if (!data) return;
  fveEl.textContent = formatKw(data.fveKw);
  feedinEl.textContent = formatKw(data.feedinKw);
  houseEl.textContent = formatKw(data.houseKw);
  batteryEl.textContent = formatPct(data.batterySoc);
  const bpKw = data.batPowerKw;
  batPowerEl.textContent = formatBatPower(bpKw);
  if (typeof bpKw === 'number' && Math.abs(bpKw) >= 0.05) {
    batPowerLabel.textContent = bpKw > 0 ? 'Nabíjení' : 'Vybíjení';
  } else {
    batPowerLabel.textContent = 'Tok baterie';
  }
  updatedEl.textContent = 'Data ze střídače: ' + formatTime(data.uploadTime);
}

const devices = {
  shelly: {
    statusUrl: '/api/shelly',
    setUrl: '/api/shelly/set',
    light: document.getElementById('shellyLight'),
    state: document.getElementById('shellyState'),
    onBtn: document.getElementById('onBtn'),
    offBtn: document.getElementById('offBtn'),
    powerEl: document.getElementById('shellyPower'),
    label: 'Bojler'
  },
  pool: {
    statusUrl: '/api/pool',
    setUrl: '/api/pool/set',
    light: document.getElementById('poolLight'),
    state: document.getElementById('poolState'),
    onBtn: document.getElementById('poolOnBtn'),
    offBtn: document.getElementById('poolOffBtn'),
    label: 'Bazén'
  },
  solinator: {
    statusUrl: '/api/solinator',
    setUrl: '/api/solinator/set',
    light: document.getElementById('solinatorLight'),
    state: document.getElementById('solinatorState'),
    onBtn: document.getElementById('solinatorOnBtn'),
    offBtn: document.getElementById('solinatorOffBtn'),
    label: 'Solinátor'
  },
  lightDole: {
    statusUrl: '/api/light/zahradadole',
    setUrl: '/api/light/zahradadole/set',
    light: document.getElementById('lightDoleLight'),
    state: document.getElementById('lightDoleState'),
    onBtn: document.getElementById('lightDoleOnBtn'),
    offBtn: document.getElementById('lightDoleOffBtn'),
    label: 'Zahrada dole'
  },
  lightNahore: {
    statusUrl: '/api/light/zahradanahore',
    setUrl: '/api/light/zahradanahore/set',
    light: document.getElementById('lightNahoreLight'),
    state: document.getElementById('lightNahoreState'),
    onBtn: document.getElementById('lightNahoreOnBtn'),
    offBtn: document.getElementById('lightNahoreOffBtn'),
    label: 'Zahrada nahoře'
  },
  lightBazen: {
    statusUrl: '/api/light/bazen',
    setUrl: '/api/light/bazen/set',
    light: document.getElementById('lightBazenLight'),
    state: document.getElementById('lightBazenState'),
    onBtn: document.getElementById('lightBazenOnBtn'),
    offBtn: document.getElementById('lightBazenOffBtn'),
    label: 'Světlo bazén'
  },
  lightNocni: {
    statusUrl: '/api/light/nocni',
    setUrl: '/api/light/nocni/set',
    light: document.getElementById('lightNocniLight'),
    state: document.getElementById('lightNocniState'),
    onBtn: document.getElementById('lightNocniOnBtn'),
    offBtn: document.getElementById('lightNocniOffBtn'),
    label: 'Noční světla'
  }
};

function renderDevice(device, data) {
  if (!data || data.isOn === null || data.isOn === undefined) {
    device.light.className = 'traffic-light';
    device.state.textContent = 'neznámý';
    device.onBtn.classList.remove('active-state');
    device.offBtn.classList.remove('active-state');
    if (device.powerEl) device.powerEl.textContent = '';
    return;
  }
  if (data.isOn) {
    device.light.className = 'traffic-light on';
    device.state.textContent = 'zapnuto';
    device.onBtn.classList.add('active-state');
    device.offBtn.classList.remove('active-state');
  } else {
    device.light.className = 'traffic-light off';
    device.state.textContent = 'vypnuto';
    device.offBtn.classList.add('active-state');
    device.onBtn.classList.remove('active-state');
  }
  if (device.powerEl) {
    device.powerEl.textContent = typeof data.powerW === 'number'
      ? Math.round(data.powerW) + ' W'
      : '';
  }
}

async function setDeviceState(device, turn) {
  device.onBtn.disabled = true;
  device.offBtn.disabled = true;
  try {
    const res = await fetch(device.setUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ turn })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Příkaz se nepodařilo odeslat.');
    errorEl.classList.remove('show');
  } catch (err) {
    errorEl.textContent = device.label + ' se nepodařilo přepnout: ' + err.message;
    errorEl.classList.add('show');
  }
  // Nový stav přijde ze serveru přes SSE stream
  device.onBtn.disabled = false;
  device.offBtn.disabled = false;
}

Object.values(devices).forEach(device => {
  device.onBtn.addEventListener('click', () => setDeviceState(device, 'on'));
  device.offBtn.addEventListener('click', () => setDeviceState(device, 'off'));
});

function renderPoolPower(totalPowerW) {
  poolTotalPowerEl.textContent = typeof totalPowerW === 'number'
    ? 'Bazén: ' + Math.round(totalPowerW) + ' W'
    : '';
}

// ---------- Graf přetoku za 24 h ----------

const chartCanvas = document.getElementById('feedinChart');
const feedinTotalEl = document.getElementById('feedinTotal');
let history = [];

// Vyvezená energie (kWh) = plocha pod kladnou částí křivky přetoku.
// Mezery delší než 10 min (výpadek serveru/dat) se do součtu nepočítají.
function computeFeedinKwh(pts) {
  let kwh = 0;
  for (let i = 1; i < pts.length; i++) {
    const dtMs = pts[i].t - pts[i - 1].t;
    if (dtMs > 10 * 60 * 1000) continue;
    const avgKw = (Math.max(0, pts[i - 1].kw) + Math.max(0, pts[i].kw)) / 2;
    kwh += avgKw * (dtMs / 3600000);
  }
  return kwh;
}

function renderChart() {
  const ctx = chartCanvas.getContext('2d');
  const w = chartCanvas.clientWidth || 300;
  const h = chartCanvas.clientHeight || 120;
  const dpr = window.devicePixelRatio || 1;
  chartCanvas.width = w * dpr;
  chartCanvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const now = Date.now();
  const start = now - 24 * 60 * 60 * 1000;
  const pts = history.filter(p => p.t >= start);

  const grey = 'rgba(44,62,80,0.4)';
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';

  if (pts.length < 2) {
    ctx.fillStyle = grey;
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Zatím sbírám data…', w / 2, h / 2);
    feedinTotalEl.textContent = '';
    return;
  }

  feedinTotalEl.textContent = 'Přetok za 24 h: '
    + computeFeedinKwh(pts).toFixed(1).replace('.', ',') + ' kWh';

  const padL = 32, padR = 8, padT = 10, padB = 18;
  let min = 0, max = 0.5;
  for (const p of pts) {
    if (p.kw < min) min = p.kw;
    if (p.kw > max) max = p.kw;
  }

  const x = t => padL + ((t - start) / (now - start)) * (w - padL - padR);
  const y = kw => padT + (1 - (kw - min) / (max - min)) * (h - padT - padB);

  // Nulová linka
  ctx.strokeStyle = 'rgba(44,62,80,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, y(0));
  ctx.lineTo(w - padR, y(0));
  ctx.stroke();

  // Popisky osy Y
  ctx.fillStyle = grey;
  ctx.textAlign = 'right';
  ctx.fillText(max.toFixed(1).replace('.', ','), padL - 5, y(max) + 8);
  ctx.fillText('0', padL - 5, y(0) + 3);
  if (min < 0) ctx.fillText(min.toFixed(1).replace('.', ','), padL - 5, y(min) - 2);

  // Časové značky po 6 hodinách
  ctx.textAlign = 'center';
  for (let i = 0; i <= 4; i++) {
    const t = start + i * 6 * 60 * 60 * 1000;
    const d = new Date(t);
    ctx.fillText(d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'), x(t), h - 5);
  }

  // Výplň pod křivkou
  ctx.beginPath();
  ctx.moveTo(x(pts[0].t), y(pts[0].kw));
  for (const p of pts) ctx.lineTo(x(p.t), y(p.kw));
  ctx.lineTo(x(pts[pts.length - 1].t), y(0));
  ctx.lineTo(x(pts[0].t), y(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,147,61,0.18)';
  ctx.fill();

  // Křivka
  ctx.beginPath();
  ctx.moveTo(x(pts[0].t), y(pts[0].kw));
  for (const p of pts) ctx.lineTo(x(p.t), y(p.kw));
  ctx.strokeStyle = '#f5933d';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
}

window.addEventListener('resize', renderChart);

// ---------- SSE stream — živé aktualizace ze serveru ----------

let es = null;

function applySnapshot(snap) {
  renderSolax(snap.solax);
  for (const key of Object.keys(snap.devices || {})) {
    if (devices[key]) renderDevice(devices[key], snap.devices[key]);
  }
  renderPoolPower(snap.poolPowerW);
  history = snap.history || [];
  renderChart();
  if (snap.pushEnabled === false) notifBtn.style.display = 'none';
}

function connectStream() {
  if (es) es.close();
  es = new EventSource('/api/stream');
  es.addEventListener('snapshot', e => {
    applySnapshot(JSON.parse(e.data));
    errorEl.classList.remove('show');
  });
  es.addEventListener('solax', e => {
    const d = JSON.parse(e.data);
    renderSolax(d.solax);
    if (d.historyPoint) {
      history.push(d.historyPoint);
      renderChart();
    }
    errorEl.classList.remove('show');
  });
  es.addEventListener('solaxError', e => {
    const d = JSON.parse(e.data);
    errorEl.textContent = 'Nepodařilo se načíst data: ' + d.error;
    errorEl.classList.add('show');
  });
  es.addEventListener('device', e => {
    const d = JSON.parse(e.data);
    if (devices[d.key]) renderDevice(devices[d.key], d.status);
  });
  es.addEventListener('poolPower', e => {
    renderPoolPower(JSON.parse(e.data).totalPowerW);
  });
  es.onerror = () => {
    updatedEl.textContent = 'Připojuji…';
  };
}

connectStream();

// Po návratu appky z pozadí obnovíme spojení, pokud mezitím spadlo
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && (!es || es.readyState === EventSource.CLOSED)) {
    connectStream();
  }
});

// Ruční refresh: server hned oběhne Solax i Shelly, výsledky přijdou streamem
btn.addEventListener('click', async () => {
  btn.classList.add('loading');
  btnLabel.textContent = 'Aktualizuji…';
  try {
    await fetch('/api/refresh', { method: 'POST' });
  } catch {}
  btn.classList.remove('loading');
  btnLabel.textContent = 'Aktualizovat';
});

// ---------- Push notifikace (plná baterie) ----------

const notifBtn = document.getElementById('notifBtn');
const pushSupported = 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function subscribePush() {
  await navigator.serviceWorker.register('sw.js');
  const reg = await navigator.serviceWorker.ready;
  const keyRes = await fetch('/api/push/vapid-key');
  const keyData = await keyRes.json();
  if (!keyRes.ok) throw new Error(keyData.error || 'Push není na serveru nastaven.');
  const sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(keyData.key)
  });
  await fetch('/api/push/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sub)
  });
}

notifBtn.addEventListener('click', async () => {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      notifBtn.textContent = '🔕 Notifikace zamítnuty';
      return;
    }
    await subscribePush();
    notifBtn.textContent = '🔔 Notifikace zapnuty';
    notifBtn.disabled = true;
  } catch (err) {
    errorEl.textContent = 'Notifikace se nepodařilo zapnout: ' + err.message;
    errorEl.classList.add('show');
  }
});

// Server drží subscriptions jen v paměti — po každém otevření appky se tiše přihlásíme znovu
async function initPush() {
  if (!pushSupported) {
    notifBtn.style.display = 'none';
    return;
  }
  if (Notification.permission === 'granted') {
    try {
      await subscribePush();
      notifBtn.textContent = '🔔 Notifikace zapnuty';
      notifBtn.disabled = true;
    } catch {}
  }
}

initPush();

// Slider dots
const sliderWrap = document.getElementById('sliderWrap');
const dots = document.querySelectorAll('.dot');

sliderWrap.addEventListener('scroll', () => {
  const idx = Math.round(sliderWrap.scrollLeft / sliderWrap.clientWidth);
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}, { passive: true });

dots.forEach((dot, i) => {
  dot.addEventListener('click', () => {
    sliderWrap.scrollTo({ left: i * sliderWrap.clientWidth, behavior: 'smooth' });
  });
});
</script>
